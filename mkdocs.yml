---
site_name: "ChemDCAT-AP Documentation"
site_url: https://nfdi-de.github.io/chem-dcat-ap
repo_url: https://github.com/nfdi-de/chem-dcat-ap

theme:
  name: material
  # logo-customization: https://github.com/squidfunk/mkdocs-material/discussions/2729
  custom_dir: docs/overrides
  logo_dark_mode: 'images/logo-icon.svg'
  logo_light_mode: 'images/logo-icon.svg'

  # Toggling between default/light/dark color schemes
  # https://squidfunk.github.io/mkdocs-material/setup/changing-the-colors/
  palette:

    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: 'blue grey'
      accent: 'indigo'
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: 'blue grey'
      accent: 'indigo'
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

  features:
    - content.tabs.link
    - search.highlight
    - navigation.expand
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking

  favicon: 'images/favicon.svg'

# for adding extra css/js see https://www.mkdocs.org/user-guide/customizing-your-theme/
extra_css:
  - stylesheets/extra.css


plugins:
  - search
  - mknotebooks:
      execute: false
  - mermaid2:
      version: 11.4.1
      # Optionally provide a local copy of mermaid.js (path relative to docs/)
      # javascript: local-js-pkgs/mermaid.min.js
  - mike:
      # Multi-version support, https://github.com/jimporter/mike
      canonical_version: "latest"
      version_selector: true

  # TODO rebuild docs on schema change see
  # https://github.com/dalito/linkml-project-copier/issues/39
  # - gen-files:
  #     scripts:
  #       - gen_pages.py  # or any other name or path

watch:
  - src/chem_dcat_ap/schema

nav:
  - Home: index.md
  - Material Entities: material-entities.md
  - Chemical Entities: chemical-entities.md
  - Chemical Reactions: chemical-reactions.md
  - Chemical Datasets: dataset-activity-shapes.md
  - Ontology Alignment: ontology-alignment.md
  - Adoption Guide: guidance.md
  - Quick Start: quickstart.md
  - Schema Reference: elements/overview.md
  - Versioning: versioning.md
  - Users: users.md
  - About: about.md

# enable version selector for multi-version support
extra:
  version:
    provider: mike
    alias: true
    default:
      - stable

markdown_extensions:
  - pymdownx.superfences:
      # https://mkdocs-mermaid2.readthedocs.io/en/latest/superfences
      # custom code highlighting rules
      custom_fences:
        - name: mermaid
          # disable code highlighting to display diagrams
          format: !!python/name:pymdownx.superfences.fence_code_format
          class: mermaid
  # https://facelessuser.github.io/pymdown-extensions/extensions/magiclink/
  # auto-link HTML, FTP, and email links
  - pymdownx.magiclink
  # https://squidfunk.github.io/mkdocs-material/setup/extensions/python-markdown/#admonition
  # support for call-outs
  - admonition
  # https://squidfunk.github.io/mkdocs-material/setup/extensions/python-markdown/#tables
  # create tables
  - tables
  # https://squidfunk.github.io/mkdocs-material/setup/extensions/python-markdown/#attribute-lists
  # enables use of HTML attributes and CSS classes to applicable elements
  - attr_list
  # https://squidfunk.github.io/mkdocs-material/setup/extensions/python-markdown/#markdown-in-html
  # write markdown inside of HTML
  - md_in_html
  
exclude_docs: |
  /templates-linkml/

# Uncomment this block to enable use of Google Analytics.
# Replace the property value with your own ID.
# extra:
#   analytics:
#     provider: google
#     property: G-XXXXXXXXXX
